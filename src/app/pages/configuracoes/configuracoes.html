<app-cabecalho-adm />
<section class="config-container">
    <aside class="sidebar">
        <app-menu-lateral-adm />
    </aside>

    <h1 class="titulo-vazia">Configurações</h1>

    <form [formGroup]="configForm" class="form-wrapper" (ngSubmit)="salvarConfig()">

        <!-- Card: Informações do Cabeçalho -->
        <div class="card-neon">
            <h2>Informações do Cabeçalho</h2>

            <div class="form-group">
                <label>Endereço</label>
                <input type="text" formControlName="endereco" class="input-gray input-long">
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <!-- Input mais curto conforme a imagem -->
                <input type="text" formControlName="telefone" class="input-gray input-short">
            </div>
        </div>

        <!-- Card: Links Sociais -->
        <div class="card-neon">
            <h2>Links Sociais</h2>

            <div class="form-group">
                <label><i class="icon-facebook"></i> Facebook</label>
                <input type="text" formControlName="facebook" class="input-gray input-long">
            </div>

            <div class="form-group">
                <label><i class="icon-instagram"></i> Instagram</label>
                <input type="text" formControlName="instagram" class="input-gray input-long">
            </div>

            <div class="form-group">
                <label><i class="icon-linkedin"></i> Linkedin</label>
                <input type="text" formControlName="linkedin" class="input-gray input-long">
            </div>

            <div class="form-group">
                <label><i class="icon-twitter"></i> Twitter</label>
                <input type="text" formControlName="twitter" class="input-gray input-long">
            </div>
        </div>

    </form>
</section>
